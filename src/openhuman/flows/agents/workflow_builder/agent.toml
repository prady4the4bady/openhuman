id = "workflow_builder"
display_name = "Workflow Builder"
delegate_name = "build_workflow"
when_to_use = "Workflow authoring specialist — owns building tinyflows automation graphs from a natural-language description. Route any request to 'set up a workflow that…', 'automate…', 'when X happens do Y', 'build/create/edit an automation or flow', or to iterate on a proposed workflow here. It grounds nodes in real tool slugs + connections, dry-runs a draft in a sandbox to self-check, and returns a workflow PROPOSAL for review. Persistence stays with the user's Accept + Save; when the user explicitly asks the agent to save (or test-run) onto an existing flow id it may `save_workflow` / `run_flow` — but never on its own, and it can never create a new flow or enable/disable one. Not for running an already-saved flow (that is a direct flows_run) and not for the legacy skill 'workflows'."
temperature = 0.2
max_iterations = 12
iteration_policy = "extended"
max_result_chars = 12000
# No sandbox filter needed: the belt is propose/read/dry-run plus two
# explicitly-bounded writes (save_workflow onto an existing flow;
# run_flow of a saved flow behind a confirm-first prompt rule), and
# dry_run_workflow runs against tinyflows MOCK capabilities (no real effects).
sandbox_mode = "none"
omit_identity = true
omit_memory_context = true
# Safety preamble stays OFF: this agent has zero real external effect (it only
# proposes validated graphs and reads), so the general acting guard-rails would
# be noise. The "propose, never persist" invariant is taught in prompt.md.
omit_safety_preamble = true
omit_skills_catalog = true

[model]
# Graph authoring is multi-step structured reasoning (ground slugs, wire
# expressions, self-check a dry run, then save) — worth the reasoning tier.
hint = "reasoning"

[tools]
# DELIBERATELY NARROW: propose/revise (validate-only) + read (flows, runs,
# connections, tool catalog) + sandbox dry-run + Composio discovery/connect +
# a confirmed real test-run of a SAVED flow + save_workflow (persist a graph
# onto an EXISTING flow only). NO shell, NO file writes, NO channel sends, NO
# composio_execute, and NO flows_create/set_enabled — the agent can never
# create or enable a flow, or perform an arbitrary real integration action
# directly. Composio access is limited to LISTING toolkits/connections,
# raising the inline CONNECT card (an approval-gated OAuth hand-off), and one
# narrow carve-out below.
# `run_flow` executes a flow the user has ALREADY saved to test it — a real
# run, but the prompt requires asking the user to confirm first, and the flow's
# own approval gate still pauses outbound-action nodes. (Named `run_flow`, not
# `run_workflow` — that name belongs to the unrelated legacy skills-workflow
# runner tool, which is registered in the same default tool registry.)
# `get_tool_output_sample` (B12) IS a real Composio call — the one deliberate
# carve-out — but it is hard-gated to Read-scope actions only (regardless of
# the user's scope preference) against an already-connected toolkit, and
# exists solely to sample the real output shape of a source tool whose live
# listing publishes no output schema at all (verified for every GitHub
# action), so a downstream split_out.path is never guessed. See
# `builder_tools.rs`'s module doc.
# `memory_recall` is the raw (un-delegated) memory read tool — READ-ONLY, no
# write counterpart (`memory_store` is deliberately absent). This agent is a
# Named-scope agent, so the orchestrator's `retrieve_memory` delegate would
# not synthesize context for it; the raw tool is the correct mechanism here.
# `omit_memory_context = true` stays set above, so nothing is injected
# automatically — the agent must call `memory_recall` explicitly when it
# needs the user's context.
# `memory_hybrid_search` is paired alongside it (same convention as the
# sibling `flow_discovery` agent) for keyword/lexical lookups — the
# `[learning]`-gated `MemoryAccessSection` bias instruction
# (`src/openhuman/learning/prompt_sections.rs`) tells every agent with a
# retrieval tool visible to "call `memory_recall` (or `memory_search` for
# keyword lookups)"; `memory_search` itself is not a registered tool name
# anywhere in this codebase (a pre-existing, wider naming inconsistency
# across several agent configs, out of scope here), so without a real
# keyword-capable tool visible, a keyword-memory turn on this Named scope
# could only ever reach `memory_recall` — leaving the guidance's "keyword
# lookups" half unsatisfiable. `memory_hybrid_search`'s `lexical` mode is
# the real keyword-heavy retrieval this agent needs; both stay READ-ONLY.
named = [
    "propose_workflow",
    "revise_workflow",
    "edit_workflow",
    "validate_workflow",
    "save_workflow",
    "list_flows",
    "get_flow",
    "get_flow_history",
    "get_flow_run",
    "list_flow_connections",
    "search_tool_catalog",
    "get_tool_contract",
    "get_tool_output_sample",
    "list_agent_profiles",
    "list_connectable_toolkits",
    "list_node_kinds",
    "get_node_kind_contract",
    "dry_run_workflow",
    "list_flow_runs",
    "resume_flow_run",
    "cancel_flow_run",
    "create_workflow",
    "duplicate_flow",
    "run_flow",
    "composio_list_toolkits",
    "composio_list_connections",
    "composio_connect",
    "memory_recall",
    "memory_hybrid_search",
]
